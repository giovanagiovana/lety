<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Para Minha Amiga Especial ❤️</title>
    <style>
        /* Importando uma fonte muito legível */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        body {
            background: linear-gradient(to bottom right, #f8cdda, #e9a3b9); 
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* FONTE ROBO TO: Muito clara e legível */
            font-family: 'Roboto', sans-serif;
            color: #4a0404;
            position: relative;
        }

        .declaracao-painel {
            background: rgba(255, 255, 255, 0.95); /* Fundo um pouco mais opaco para legibilidade */
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 20;
            max-width: 80%;
            position: relative;
        }

        h1 {
            /* FONT-FAMILY E PESO PARA MÁXIMA CLAREZA */
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            color: #db2777;
            font-size: 2.5rem; /* Um pouco menor para caber bem */
            margin-bottom: 25px;
            line-height: 1.4; /* Espaçamento entre linhas melhora a leitura */
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Roboto', sans-serif; /* Fonte legível nos botões */
        }

        #btnSim {
            background: #ff69b4;
            color: white;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }

        #btnSim:hover {
            transform: scale(1.05);
            background: #ff8cbf;
        }

        #btnNao {
            background: #ccc;
            color: #555;
            position: relative;
        }

        /* Itens flutuantes no fundo (Rosas e Gatinhos) */
        .item-fundo {
            position: absolute;
            font-size: 50px;
            z-index: 5;
            animation: flutuarGirando 7s infinite ease-in-out;
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes flutuarGirando {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-40px) rotate(15deg); opacity: 0.9; }
        }

        /* Explosão de itens ao clicar em SIM */
        .explosao-item {
            position: fixed;
            font-size: 40px;
            z-index: 100;
            pointer-events: none;
            opacity: 1;
            transform: scale(1);
            animation: pularEDesaparecer 2s ease-out forwards;
        }

        @keyframes pularEDesaparecer {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(1.2) rotate(var(--r));
                opacity: 0;
            }
        }

        .marca-dagua {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            font-family: 'Roboto', sans-serif;
            color: rgba(74, 4, 4, 0.5);
            z-index: 200;
        }
    </style>
</head>
<body>

    <div class="declaracao-painel">
        <h1> le sei que samos amiga mas teremos que ficar 😉❤️</h1>
        <div class="botoes">
            <button id="btnSim" onclick="confirmar()">CLARO QUE SIM!</button>
            <button id="btnNao" onmouseover="fugir()" onclick="fugir()">NÃO</button>
        </div>
    </div>

    <div class="marca-dagua">Criado por Giovana Top Programation ✨</div>

    <script>
        // Criar elementos no fundo (Rosas e Gatinhos)
        const emojisFundo = ['🌹', '💖', '😽', '😻', '🌸', '❤️'];
        for (let i = 0; i < 25; i++) {
            const item = document.createElement('div');
            item.className = 'item-fundo';
            item.innerText = emojisFundo[Math.floor(Math.random() * emojisFundo.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.top = Math.random() * 100 + 'vh';
            item.style.fontSize = (Math.random() * 20 + 40) + 'px';
            item.style.animationDuration = (Math.random() * 4 + 4) + 's';
            item.style.animationDelay = (Math.random() * 4) + 's';
            document.body.appendChild(item);
        }

        // Função para o botão NÃO fugir
        function fugir() {
            const btn = document.getElementById('btnNao');
            const newX = Math.random() * (window.innerWidth * 0.7);
            const newY = Math.random() * (window.innerHeight * 0.7);
            btn.style.position = 'fixed';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }

        // Função para a Explosão de Amor
        function criarExplosao() {
            const emojisExplosao = ['❤️', '💖', '🌹', '😽', '😻', '✨', '💘', '🌷', '💓'];
            for (let i = 0; i < 60; i++) {
                const item = document.createElement('div');
                item.className = 'explosao-item';
                item.innerText = emojisExplosao[Math.floor(Math.random() * emojisExplosao.length)];
                
                item.style.left = (window.innerWidth / 2) + 'px';
                item.style.top = (window.innerHeight / 2) + 'px';

                const forcaX = Math.random() < 0.5 ? -1 : 1;
                const forcaY = Math.random() < 0.5 ? -1 : 1;
                item.style.setProperty('--x', (Math.random() * 500 * forcaX) + 'px');
                item.style.setProperty('--y', (Math.random() * 500 * forcaY) + 'px');
                item.style.setProperty('--r', (Math.random() * 720 - 360) + 'deg'); 

                item.style.fontSize = (Math.random() * 30 + 30) + 'px';

                document.body.appendChild(item);
                setTimeout(() => item.remove(), 2000);
            }
        }

        function confirmar() {
            criarExplosao();
            setTimeout(() => {
                alert("mande para 10 amigos e veja a reação deles");
            }, 1000);
        }
    </script>
</body>
</html>
</body>
</html>
