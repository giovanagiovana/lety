<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Para Minha Amiga Especial ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;700&display=swap');

        body {
            background: linear-gradient(to bottom right, #f8cdda, #e9a3b9); /* Tons de rosa suave */
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #4a0404;
            position: relative;
        }

        /* Painel da Declaração */
        .declaracao-painel {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 20;
            max-width: 90%;
            position: relative; /* Para os gatinhos e rosas extras */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #db2777;
            font-size: 3rem;
            margin-bottom: 25px;
            line-height: 1.2;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        #btnSim {
            background: #ff69b4; /* Rosa choque */
            color: white;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }

        #btnSim:hover {
            transform: scale(1.1);
            background: #ff8cbf;
        }

        #btnNao {
            background: #ccc; /* Cinza suave */
            color: #555;
            position: relative;
        }

        /* Rosas e Gatinhos Flutuantes no fundo */
        .item-fundo {
            position: absolute;
            font-size: 60px;
            z-index: 5;
            animation: flutuarGirando 6s infinite ease-in-out;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes flutuarGirando {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(-30px) rotate(30deg); opacity: 1; }
        }

        /* Estilo da Explosão (Corações, Gatinhos e Rosas) */
        .explosao-item {
            position: fixed;
            font-size: 50px;
            z-index: 100;
            pointer-events: none;
            opacity: 1;
            transform: scale(1);
            animation: pularEDesaparecer 2.5s ease-out forwards;
        }

        @keyframes pularEDesaparecer {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(1.5) rotate(var(--r));
                opacity: 0;
            }
        }

        .marca-dagua {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(74, 4, 4, 0.4);
            z-index: 200;
        }
    </style>
</head>
<body>

    <div class="declaracao-painel">
        <h1> le sei que samos amigas...<br>mas teremos que ficar 😉❤️</h1>
        <div class="botoes">
            <button id="btnSim" onclick="confirmar()">CLARO QUE SIM!</button>
            <button id="btnNao" onmouseover="fugir()" onclick="fugir()">NÃO</button>
        </div>
    </div>

    <div class="marca-dagua">Criado por Giovana Top Programation ✨</div>

    <script>
        // Emojis para o fundo (rosas e gatinhos)
        const emojisFundo = ['🌹', '💖', '😽', '😻', '🌸', '❤️'];
        for (let i = 0; i < 20; i++) {
            const item = document.createElement('div');
            item.className = 'item-fundo';
            item.innerText = emojisFundo[Math.floor(Math.random() * emojisFundo.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.top = Math.random() * 100 + 'vh';
            item.style.fontSize = (Math.random() * 30 + 50) + 'px'; // Tamanhos variados
            item.style.animationDuration = (Math.random() * 4 + 4) + 's';
            item.style.animationDelay = (Math.random() * 3) + 's';
            document.body.appendChild(item);
        }

        // Função para o botão NÃO fugir (o clássico truque!)
        function fugir() {
            const btn = document.getElementById('btnNao');
            const newX = Math.random() * (window.innerWidth * 0.8);
            const newY = Math.random() * (window.innerHeight * 0.8);
            btn.style.position = 'fixed';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }

        // Função para criar a Explosão de Amor quando clicar em SIM
        function criarExplosao() {
            const emojisExplosao = ['❤️', '💖', '🌹', '😽', '😻', '✨', '💘', '🌷', '💓'];
            // Cria 70 itens para a explosão
            for (let i = 0; i < 70; i++) {
                const item = document.createElement('div');
                item.className = 'explosao-item';
                item.innerText = emojisExplosao[Math.floor(Math.random() * emojisExplosao.length)];
                
                // Posição inicial no centro (perto do botão)
                item.style.left = (window.innerWidth / 2) + 'px';
                item.style.top = (window.innerHeight / 2) + 'px';

                // Variáveis da animação para onde o item vai pular
                const forçaPositivaNegativaX = Math.random() < 0.5 ? -1 : 1;
                const forçaPositivaNegativaY = Math.random() < 0.5 ? -1 : 1;
                item.style.setProperty('--x', (Math.random() * 600 * forçaPositivaNegativaX) + 'px');
                item.style.setProperty('--y', (Math.random() * 600 * forçaPositivaNegativaY) + 'px');
                item.style.setProperty('--r', (Math.random() * 720 - 360) + 'deg'); 

                item.style.fontSize = (Math.random() * 40 + 40) + 'px';

                document.body.appendChild(item);
                setTimeout(() => item.remove(), 2500);
            }
        }

        // Função quando clicar em SIM
        function confirmar() {
            criarExplosao(); // Primeiro, a explosão de amor!

            setTimeout(() => {
                alert("YAY! Mal posso esperar! ❤️😻");
                // Se quiser, pode redirecionar para o WhatsApp aqui:
                // window.location.href = "https://wa.me/SEUNUMERO?text=Eu+também+quero+ficar!+😻";
            }, 1000);
        }
    </script>
</body>
</html>
